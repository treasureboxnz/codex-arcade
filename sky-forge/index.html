<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Forge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-card" aria-label="Sky Forge arcade shooter">
        <header class="hud">
          <div>
            <h1>Sky Forge</h1>
            <p>Move with WASD or arrows. Fire with Space, J, or K. Clear 4 stages, then loop harder.</p>
          </div>
          <div class="stats">
            <div><span>Score</span><strong id="score">0</strong></div>
            <div><span>Best</span><strong id="best">0</strong></div>
            <div><span>Lives</span><strong id="lives">3</strong></div>
            <div><span id="weaponLabel">Weapon</span><strong id="weapon">Pulse</strong></div>
          </div>
        </header>

        <div class="stage-wrap">
          <canvas id="game" width="720" height="960" aria-label="Game canvas"></canvas>
          <div class="boss-panel" id="bossPanel">
            <span>Overseer</span>
            <meter id="bossMeter" min="0" max="1" value="1"></meter>
          </div>
          <div class="overlay is-visible" id="overlay">
            <strong>Launch Ready</strong>
            <span>Collect weapon cores: blue spread, violet beam, gold burst.</span>
            <button id="startBtn" type="button">Start Mission</button>
          </div>
        </div>

        <footer class="controls">
          <div class="system-buttons">
            <button id="pauseBtn" type="button" aria-label="Pause">Pause</button>
            <button id="restartBtn" type="button" aria-label="Restart">Restart</button>
          </div>
          <div class="mobile-controls" aria-label="Touch flight controls">
            <div class="dpad" aria-label="Move">
              <button data-key="ArrowUp" class="up" type="button">Up</button>
              <button data-key="ArrowLeft" class="left" type="button">Left</button>
              <button data-key="ArrowRight" class="right" type="button">Right</button>
              <button data-key="ArrowDown" class="down" type="button">Down</button>
            </div>
            <div class="action-pad" aria-label="Actions">
              <button data-key="Space" class="fire" type="button">Fire</button>
            </div>
          </div>
        </footer>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
